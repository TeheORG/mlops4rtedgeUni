name: "7️⃣♻️ Reusable: Fase 7 (Validate Model on Edge Hardware)"

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      parent_variant:
        required: true
        type: string
      params_json:
        required: true
        type: string
      checkout_branch:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: '["self-hosted", "Linux", "X64", "self-hosted-tehelab2"]'

permissions:
  contents: write
  pull-requests: write

jobs:
  ejecutar-fase-7:
    runs-on: ${{ inputs.runner != '' && fromJSON(inputs.runner) || 'ubuntu-latest' }}
    env:
      USE_VENV: 0
      SKIP_GIT_PUBLISH: "1"
      SKIP_LINEAGE: "1"
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      VARIANT_ROOT: executions/f07_modval/${{ inputs.variant_id }}
      REGISTER_EXCLUDE_EXTS: |
        .h5
        .parquet
        .tflite
        .csv
        .c
        .h
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Activar Entorno Virtual (Añadir al PATH)
        run: echo "$HOME/.venv/bin" >> $GITHUB_PATH

      - name: Debug runner env
        run: |
          echo "=== IDENTIDAD ==="
          echo "whoami=$(whoami)"
          echo "id=$(id)"
          echo "hostname=$(hostname)"
          echo "HOME=$HOME"

          echo ""
          echo "=== SISTEMA ==="
          uname -a
          cat /etc/os-release | grep -E "^(NAME|VERSION)=" || true
          echo "uptime=$(uptime)"

          echo ""
          echo "=== PATH Y VENV ==="
          echo "PATH=$PATH"
          which dvc 2>/dev/null && echo "dvc found at: $(which dvc)" || echo "dvc NOT found in PATH"
          ls "$HOME/.venv/bin/" 2>/dev/null || echo "no venv at $HOME/.venv"

          echo ""
          echo "=== BUSCAR DVC EN DISCO ==="
          find /home /opt /usr/local -name "dvc" 2>/dev/null | head -10 || true

          echo ""
          echo "=== HOME DIR ==="
          ls -la "$HOME/" 2>/dev/null || true

          echo ""
          echo "=== CONTENEDOR / K8S ==="
          cat /proc/1/cgroup | head -5 || true
          ls /.dockerenv 2>/dev/null && echo "Dentro de Docker" || echo "No es Docker"
          ls /var/run/secrets/kubernetes.io 2>/dev/null && echo "Dentro de K8s pod" || echo "No K8s secrets"

      - name: Configurar Git y DVC
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user "$DAGSHUB_USER"
          dvc remote modify storage --local password "$DAGSHUB_TOKEN"

      - name: DVC Pull (Traer datos de Fase 6)
        run: dvc pull executions/f06_quant/${{ inputs.parent_variant }}/*.dvc

      # =========================================================
      # STEP 1: variant7
      # =========================================================
      - name: Crear variante Fase 7
        env:
          PARAMS_JSON: ${{ inputs.params_json }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          def to_make_value(value):
              if isinstance(value, bool):
                  return "true" if value else "false"
              if isinstance(value, (list, dict)):
                  return json.dumps(value, ensure_ascii=False, separators=(",", ":"))
              return str(value)

          raw = os.environ.get("PARAMS_JSON", "").strip()
          params = json.loads(raw) if raw else {}

          if isinstance(params, str):
              try:
                  params = json.loads(params)
              except Exception:
                  pass

          if not isinstance(params, dict):
              print(f"[WARN] params no es dict, asumiendo dict vacío. Type={type(params)}")
              params = {}

          extra_args = []
          for key, value in params.items():
              k = str(key).strip()
              if not k:
                  continue
              extra_args.append(f"{k}={to_make_value(value)}")

          print("Ejecutando con:", " ".join(extra_args))

          subprocess.run(
              [
                  "make",
                  "variant7",
                  "VARIANT=${{ inputs.variant_id }}",
                  "PARENT=${{ inputs.parent_variant }}",
                  *extra_args,
              ],
              check=True,
          )
          PY

      - name: PR — publicar variant
        id: pr-variant
        uses: TeheORG/mlops4rtedgeUni/.github/actions/commit-and-pr@main
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f7
          step: variant
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkout_branch: ${{ inputs.checkout_branch }}

      - name: Merge PR de variant
        if: ${{ steps.pr-variant.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-variant.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      - name: Sync con base tras merge de variant
        if: ${{ steps.pr-variant.outputs.PR_NUMBER != '' }}
        run: |
          git fetch origin
          git checkout "${{ inputs.checkout_branch }}"
          git pull --ff-only origin "${{ inputs.checkout_branch }}"

      # =========================================================
      # STEP 2: script7
      # =========================================================
      - name: Ejecutar script de Fase 7
        env:
          PYTHONFAULTHANDLER: 1
        run: make script7 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar script
        id: pr-script
        uses: TeheORG/mlops4rtedgeUni/.github/actions/commit-and-pr@main
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f7
          step: script
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkout_branch: ${{ inputs.checkout_branch }}

      - name: Merge PR de script
        if: ${{ steps.pr-script.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-script.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      - name: Sync con base tras merge de script
        if: ${{ steps.pr-script.outputs.PR_NUMBER != '' }}
        run: |
          git fetch origin
          git checkout "${{ inputs.checkout_branch }}"
          git pull --ff-only origin "${{ inputs.checkout_branch }}"

      # =========================================================
      # STEP 3: check7
      # =========================================================
      - name: Verificar resultados
        id: run-check
        if: always()
        run: |
          set +e
          make check7 VARIANT=${{ inputs.variant_id }}
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -ne 0 ]; then
            echo "[WARN] check7 failed with exit code $rc; continuing so verification metadata can be published"
          fi
          exit 0

      - name: PR — publicar check
        id: pr-check
        if: always()
        uses: TeheORG/mlops4rtedgeUni/.github/actions/commit-and-pr@main
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f7
          step: check
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkout_branch: ${{ inputs.checkout_branch }}

      - name: Merge PR de check
        if: ${{ always() && steps.pr-check.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-check.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      - name: Sync con base tras merge de check
        if: ${{ always() && steps.pr-check.outputs.PR_NUMBER != '' }}
        run: |
          git fetch origin
          git checkout "${{ inputs.checkout_branch }}"
          git pull --ff-only origin "${{ inputs.checkout_branch }}"

      # =========================================================
      # STEP 4: register7
      # =========================================================
      - name: Registrar resultados de F7
        run: make register7 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar register
        id: pr-register
        uses: TeheORG/mlops4rtedgeUni/.github/actions/commit-and-pr@main
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f7
          step: register
          paths: |
            ${{ env.VARIANT_ROOT }}
            .dvc/config
            dvc.yaml
            dvc.lock
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkout_branch: ${{ inputs.checkout_branch }}

      - name: Merge PR de register
        if: ${{ steps.pr-register.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-register.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done
