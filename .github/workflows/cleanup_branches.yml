name: Cleanup stale mlops branches
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete merged mlops/* branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git branch -r --merged origin/main \
            | grep 'origin/mlops/' \
            | sed 's|origin/||' \
            | while read branch; do
                echo "Deleting $branch"
                git push origin --delete "$branch" || true
              done
