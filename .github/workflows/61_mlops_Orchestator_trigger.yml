name: 🚦 API MLOps Orchestrator (Trigger)

on:
  repository_dispatch:
    types: [ejecutar-fase-api]

permissions:
  contents: write
  pull-requests: write

jobs:
  validar-payload:
    runs-on: ubuntu-latest
    env:
      FASES_ALLOWED: "f01_explore,f02_events,f03_windows,f04_targets,f05_modeling,f06_quant,f07_modval,f08_sysval"
      FASES_REQUIRING_PARENT: "f02_events,f03_windows,f04_targets,f05_modeling,f06_quant,f07_modval"
    outputs:
      fase:           ${{ steps.validar.outputs.fase }}
      fase_01:        ${{ steps.validar.outputs.fase_01 }}
      fase_02:        ${{ steps.validar.outputs.fase_02 }}
      fase_03:        ${{ steps.validar.outputs.fase_03 }}
      fase_04:        ${{ steps.validar.outputs.fase_04 }}
      fase_05:        ${{ steps.validar.outputs.fase_05 }}
      fase_06:        ${{ steps.validar.outputs.fase_06 }}
      fase_07:        ${{ steps.validar.outputs.fase_07 }}
      fase_08:        ${{ steps.validar.outputs.fase_08 }}
      variant_id:     ${{ steps.validar.outputs.variant_id }}
      parent_variant: ${{ steps.validar.outputs.parent_variant }}
      parents_variant: ${{ steps.validar.outputs.parents_variant }}
      catalog_variant: ${{ steps.validar.outputs.catalog_variant }}
      params_json:    ${{ steps.validar.outputs.params_json }}
      runner:         ${{ steps.validar.outputs.runner }}
      runner_name:    ${{ steps.validar.outputs.runner_name }}

      checkout_branch: ${{ steps.read-config.outputs.checkout_branch }}
    steps:
      - name: 📥 Log raw request body
        env:
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  CLIENT PAYLOAD RECIBIDO (antes de cualquier validación)"
          echo "════════════════════════════════════════════════════"
          echo "$CLIENT_PAYLOAD" | python3 -m json.tool
          echo "════════════════════════════════════════════════════"

      - name: Checkout repo (para leer config)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Leer configuración de rama
        id: read-config
        env:
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          python3 - <<'PY'
          import json, yaml, os

          payload = json.loads(os.environ.get("CLIENT_PAYLOAD", "{}"))

          # Priority 1: checkout_branch comes directly in the payload (multi-pipeline)
          checkout_branch = payload.get("checkout_branch", "").strip()

          # Priority 2 (fallback): read from the local setup file (generated by make setup)
          if not checkout_branch:
              try:
                  with open(".mlops4ofp/setup.yaml") as f:
                      config = yaml.safe_load(f) or {}
                  checkout_branch = config.get("git", {}).get("branch", "test")
              except Exception as e:
                  print(f"[WARN] No se pudo leer .mlops4ofp/setup.yaml: {e}. Usando 'test' por defecto")
                  checkout_branch = "test"

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"checkout_branch={checkout_branch}\n")
          print(f"[INFO] checkout_branch={checkout_branch}")
          PY

      - name: Validar y normalizar payload
        id: validar
        env:
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          python3 - <<'PY'
          import json, re, sys, os
          import yaml

          def parse_csv_env(name: str) -> list[str]:
              raw = os.environ.get(name, "")
              values = [item.strip() for item in raw.split(",") if item.strip()]
              if not values:
                  print(f"[ERROR] Variable de entorno vacia o invalida: {name}")
                  sys.exit(1)
              return values

          fases_allowed_list = parse_csv_env("FASES_ALLOWED")
          fases_requiring_parent_list = parse_csv_env("FASES_REQUIRING_PARENT")

          FASES_ALLOWED = set(fases_allowed_list)
          FASES_REQUIRING_PARENT = set(fases_requiring_parent_list)

          if len(fases_allowed_list) < 8:
              print("[ERROR] FASES_ALLOWED debe incluir al menos 8 fases ordenadas")
              sys.exit(1)

          FASE_04 = fases_allowed_list[3]
          FASE_08 = fases_allowed_list[7]

          def infer_phase_number(fase: str) -> int:
              m = re.match(r'^f?(\d{2})_', fase)
              if not m:
                  raise ValueError(f"Cannot infer phase number from fase={fase!r}")
              return int(m.group(1))

          def normalize_variant(fase: str, variant: str) -> str:
              """
              Normalize VARIANT to canonical format vY_XXXX.
              - Y is the phase digit inferred from fase (e.g. 'f02_prepareeventsds' → 2)
              - Accepted inputs:
                  canonical : vY_XXXX
                  shorthand : vNNNN | vNNN | vNN | vN | NNNN | NNN | NN | N
              """
              phase_digit = infer_phase_number(fase)

              # Already canonical: vY_XXXX
              m = re.match(r'^v(\d)_(\d{4})$', variant)
              if m:
                  if int(m.group(1)) != phase_digit:
                      raise ValueError(
                          f"Wrong phase marker in variant={variant!r} for fase={fase!r}; "
                          f"expected v{phase_digit}_XXXX"
                      )
                  return f"v{m.group(1)}_{m.group(2)}"

              # Shorthand: v?NNNN (1-4 digits)
              m = re.match(r'^v?(\d{1,4})$', variant)
              if m:
                  num = int(m.group(1))
                  return f"v{phase_digit}_{num:04d}"

              raise ValueError(
                  f"Invalid variant format: {variant!r}. "
                  f"Use vY_XXXX or shorthand vNNNN/NNNN"
              )

          def normalize_variant_for_fase(fase: str, variant: str, field: str) -> str:
              try:
                  return normalize_variant(fase, variant)
              except ValueError as e:
                  print(f"[ERROR] Field '{field}': {e}")
                  sys.exit(1)

          # ── Parse payload ──────────────────────────────────────────────────────
          payload = json.loads(os.environ["CLIENT_PAYLOAD"])
          fase = str(payload.get("fase", "")).strip().lower()

          if fase not in FASES_ALLOWED:
              print(f"[ERROR] 'fase' invalida: {fase!r}. Usa una de: {sorted(FASES_ALLOWED)}")
              sys.exit(1)

          if not payload.get("variant_id"):
              print("[ERROR] Falta 'variant_id' en client_payload")
              sys.exit(1)

          if fase in FASES_REQUIRING_PARENT and not payload.get("parent_variant"):
              print(f"[ERROR] En {fase} falta 'parent_variant' en client_payload")
              sys.exit(1)

          if fase == FASE_08 and not payload.get("parent_variant"):
              print("[ERROR] En fase8 falta 'parent_variant' en client_payload")
              sys.exit(1)

          params = payload.get("params")
          if isinstance(params, str):
              try:
                  params = json.loads(params)
              except Exception:
                  pass
          if "params" not in payload or not isinstance(params, dict):
              print("[ERROR] 'params' debe ser un objeto JSON (dict)")
              sys.exit(1)

          # ── Normalize variants ─────────────────────────────────────────────────
          variant_id = normalize_variant_for_fase(fase, payload["variant_id"], "variant_id")

          parent_variant  = ""
          parents_variant = ""
          catalog_variant = ""

          if payload.get("parent_variant") and fase != FASE_08:
              parent_variant = normalize_variant_for_fase(
                  # parent belongs to the previous fase
                  f"f{infer_phase_number(fase)-1:02d}_prev",
                  payload["parent_variant"],
                  "parent_variant",
              )

          if fase == FASE_08 and payload.get("parent_variant"):
              raw = payload["parent_variant"]
              if isinstance(raw, str):
                  try:
                      raw = json.loads(raw)
                  except Exception:
                      raw = [raw]
              items = raw if isinstance(raw, list) else [raw]
              normalized = []
              for item in items:
                  m = re.match(r'^v(\d)_(\d{4})$', str(item))
                  if m:
                      normalized.append(f"v{m.group(1)}_{m.group(2)}")
                  else:
                      m2 = re.match(r'^v?(\d{1,4})$', str(item))
                      if m2:
                          print(f"[ERROR] 'parent_variant' item {item!r} must be canonical (vY_XXXX) in fase8")
                          sys.exit(1)
                      else:
                          print(f"[ERROR] Invalid format for 'parent_variant' item: {item!r}")
                          sys.exit(1)
              parents_variant = json.dumps(normalized)

          if payload.get("catalog_variant"):
              catalog_variant = normalize_variant_for_fase(
                # En F04, catalog_variant siempre referencia artefactos de F02.
                "02_catalog", payload["catalog_variant"], "catalog_variant"
              )

          # ── Runner serialization ───────────────────────────────────────────────
          runner_raw = payload.get("runner")
          if runner_raw is None:
              # Empty string signals reusable workflows to use their own default
              runner_json = ""
          elif isinstance(runner_raw, list):
              runner_json = json.dumps(runner_raw)
          else:
              runner_json = json.dumps(str(runner_raw))

          # ── Write outputs ──────────────────────────────────────────────────────
          outputs = {
              "fase":            fase,
              "fase_01":         fases_allowed_list[0],
              "fase_02":         fases_allowed_list[1],
              "fase_03":         fases_allowed_list[2],
              "fase_04":         fases_allowed_list[3],
              "fase_05":         fases_allowed_list[4],
              "fase_06":         fases_allowed_list[5],
              "fase_07":         fases_allowed_list[6],
              "fase_08":         fases_allowed_list[7],
              "variant_id":      variant_id,
              "parent_variant":  parent_variant,
              "parents_variant": parents_variant,
              "catalog_variant": catalog_variant,
              "params_json":     json.dumps(params),
              "runner":          runner_json,
              "runner_name":     payload.get("runner_name", ""),
          }
              

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              for k, v in outputs.items():
                  print(f"{k}={v}", file=fh)

          print(f"[OK] Payload válido → variant_id={variant_id}")
          PY

  # ── Phase triggers ───────────────────────────────────────────────────────────

  trigger-fase1:
    needs: validar-payload
    if: ${{ needs.validar-payload.outputs.fase == needs.validar-payload.outputs.fase_01 }}
    uses: ./.github/workflows/reusable_fase1-Explore.yml
    with:
      variant_id:      ${{ needs.validar-payload.outputs.variant_id }}
      params_json:     ${{ needs.validar-payload.outputs.params_json }}
      checkout_branch: ${{ needs.validar-payload.outputs.checkout_branch }}
      runner:          ${{ needs.validar-payload.outputs.runner }}
      runner_name:    ${{ needs.validar-payload.outputs.runner_name }}
    secrets: inherit

  trigger-fase2:
    needs: validar-payload
    if: ${{ needs.validar-payload.outputs.fase == needs.validar-payload.outputs.fase_02 }}
    uses: ./.github/workflows/reusable_fase2-PrepareEvents.yml
    with:
      variant_id:      ${{ needs.validar-payload.outputs.variant_id }}
      parent_variant:  ${{ needs.validar-payload.outputs.parent_variant }}
      params_json:     ${{ needs.validar-payload.outputs.params_json }}
      checkout_branch: ${{ needs.validar-payload.outputs.checkout_branch }}
      runner:          ${{ needs.validar-payload.outputs.runner }}
      runner_name:    ${{ needs.validar-payload.outputs.runner_name }}
    secrets: inherit

  trigger-fase3:
    needs: validar-payload
    if: ${{ needs.validar-payload.outputs.fase == needs.validar-payload.outputs.fase_03 }}
    uses: ./.github/workflows/reusable_fase3-PrepareWindows.yml
    with:
      variant_id:      ${{ needs.validar-payload.outputs.variant_id }}
      parent_variant:  ${{ needs.validar-payload.outputs.parent_variant }}
      params_json:     ${{ needs.validar-payload.outputs.params_json }}
      checkout_branch: ${{ needs.validar-payload.outputs.checkout_branch }}
      runner:          ${{ needs.validar-payload.outputs.runner }}
      runner_name:    ${{ needs.validar-payload.outputs.runner_name }}
    secrets: inherit

  trigger-fase4:
    needs: validar-payload
    if: ${{ needs.validar-payload.outputs.fase == needs.validar-payload.outputs.fase_04 }}
    uses: ./.github/workflows/reusable_fase4-TargetEngineering.yml
    with:
      variant_id:      ${{ needs.validar-payload.outputs.variant_id }}
      parent_variant:  ${{ needs.validar-payload.outputs.parent_variant }}
      catalog_variant: ${{ needs.validar-payload.outputs.catalog_variant }}
      params_json:     ${{ needs.validar-payload.outputs.params_json }}
      checkout_branch: ${{ needs.validar-payload.outputs.checkout_branch }}
      runner:          ${{ needs.validar-payload.outputs.runner }}
      runner_name:    ${{ needs.validar-payload.outputs.runner_name }}
    secrets: inherit

  trigger-fase5:
    needs: validar-payload
    if: ${{ needs.validar-payload.outputs.fase == needs.validar-payload.outputs.fase_05 }}
    uses: ./.github/workflows/reusable_fase5-Modeling.yml
    with:
      variant_id:      ${{ needs.validar-payload.outputs.variant_id }}
      parent_variant:  ${{ needs.validar-payload.outputs.parent_variant }}
      params_json:     ${{ needs.validar-payload.outputs.params_json }}
      checkout_branch: ${{ needs.validar-payload.outputs.checkout_branch }}
      runner:          ${{ needs.validar-payload.outputs.runner }}
      runner_name:    ${{ needs.validar-payload.outputs.runner_name }}
    secrets: inherit

  trigger-fase6:
    needs: validar-payload
    if: ${{ needs.validar-payload.outputs.fase == needs.validar-payload.outputs.fase_06 }}
    uses: ./.github/workflows/reusable_fase6-Quantiza&packageForEdge.yml
    with:
      variant_id:      ${{ needs.validar-payload.outputs.variant_id }}
      parent_variant:  ${{ needs.validar-payload.outputs.parent_variant }}
      params_json:     ${{ needs.validar-payload.outputs.params_json }}
      checkout_branch: ${{ needs.validar-payload.outputs.checkout_branch }}
      runner:          ${{ needs.validar-payload.outputs.runner }}
      runner_name:    ${{ needs.validar-payload.outputs.runner_name }}
    secrets: inherit

  trigger-fase7:
    needs: validar-payload
    if: ${{ needs.validar-payload.outputs.fase == needs.validar-payload.outputs.fase_07 }}
    uses: ./.github/workflows/reusable_fase7-ValidateModelEdgeHardware.yml
    with:
      variant_id:      ${{ needs.validar-payload.outputs.variant_id }}
      parent_variant:  ${{ needs.validar-payload.outputs.parent_variant }}
      params_json:     ${{ needs.validar-payload.outputs.params_json }}
      checkout_branch: ${{ needs.validar-payload.outputs.checkout_branch }}
      runner:          ${{ needs.validar-payload.outputs.runner }}
      runner_name:    ${{ needs.validar-payload.outputs.runner_name }}
    secrets: inherit

  trigger-fase8:
    needs: validar-payload
    if: ${{ needs.validar-payload.outputs.fase == needs.validar-payload.outputs.fase_08 }}
    uses: ./.github/workflows/reusable_fase8-ValidateMulti-ModelEdgeSystem.yml
    with:
      variant_id:      ${{ needs.validar-payload.outputs.variant_id }}
      parents_variant: ${{ needs.validar-payload.outputs.parents_variant }}
      params_json:     ${{ needs.validar-payload.outputs.params_json }}
      checkout_branch: ${{ needs.validar-payload.outputs.checkout_branch }}
      runner:          ${{ needs.validar-payload.outputs.runner }}
      runner_name:    ${{ needs.validar-payload.outputs.runner_name }}
    secrets: inherit