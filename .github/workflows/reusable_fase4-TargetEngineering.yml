name: "4️⃣♻️ Reusable: Fase 4 (Target Engineering)"

on:
  workflow_call:
    inputs:
      variant_id:
        required: true
        type: string
      parent_variant:
        required: true
        type: string
      catalog_variant:
        required: false
        type: string
        default: ''
      params_json:
        required: true
        type: string
      checkout_branch:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: '"ubuntu-latest"'

permissions:
  contents: write
  pull-requests: write

jobs:
  ejecutar-fase-4:
    runs-on: ${{ inputs.runner != '' && fromJSON(inputs.runner) || 'ubuntu-latest' }}
    container:
      image: ${{ vars.IMAGE_MLOPS || 'ghcr.io/tehedor/mlops_actions_v2/mlops-env:latest' }}
    env:
      USE_VENV: 0
      SKIP_GIT_PUBLISH: "1"
      SKIP_LINEAGE: "1"
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      VARIANT_ROOT: executions/f04_targets/${{ inputs.variant_id }}
      REGISTER_EXCLUDE_EXTS: |
        .h5
        .parquet
        .tflite
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git y DVC
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user "$DAGSHUB_USER"
          dvc remote modify storage --local password "$DAGSHUB_TOKEN"

      - name: Resolver catalog_variant de Fase 2
        id: resolver-catalog
        run: |
          python - <<'PY'
          import re
          import os
          import sys
          from pathlib import Path

          import yaml

          def infer_phase_number(fase: str) -> int:
            match = re.match(r'^f?(\d{2})_', fase)
            if not match:
              raise ValueError(f'Cannot infer phase number from fase={fase!r}')
            return int(match.group(1))

          def normalize_variant(fase: str, variant: str) -> str:
            phase_digit = infer_phase_number(fase)
            match = re.match(r'^v(\d)_(\d{4})$', variant)
            if match:
              if int(match.group(1)) != phase_digit:
                raise ValueError(
                  f'Wrong phase marker in variant={variant!r} for fase={fase!r}; '
                  f'expected v{phase_digit}_XXXX'
                )
              return f"v{match.group(1)}_{match.group(2)}"
            match = re.match(r'^v?(\d{1,4})$', variant)
            if match:
              return f"v{phase_digit}_{int(match.group(1)):04d}"
            raise ValueError(f'Invalid variant format: {variant!r}')

          catalog_variant = '''${{ inputs.catalog_variant }}'''.strip()
          if catalog_variant:
            catalog_variant = normalize_variant('f02_events', catalog_variant)
          else:
            parent_variant = '''${{ inputs.parent_variant }}'''.strip()
            params_path = Path('executions') / 'f03_windows' / parent_variant / 'params.yaml'

            if not params_path.exists():
              print(f"[ERROR] No existe params.yaml de F03 para inferir catalog_variant: {params_path}")
              sys.exit(1)

            data = yaml.safe_load(params_path.read_text()) or {}
            inferred = data.get('parent')
            if not inferred:
              print(f"[ERROR] F03 {parent_variant!r} no contiene 'parent' para inferir catalog_variant")
              sys.exit(1)

            catalog_variant = normalize_variant('f02_events', str(inferred))

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
            fh.write(f"catalog_variant={catalog_variant}\n")
          print(f"[INFO] catalog_variant={catalog_variant}")
          PY

      - name: DVC Pull (Datos para Fase 4)
        run: |
          dvc pull executions/f02_events/${{ steps.resolver-catalog.outputs.catalog_variant }}/*.dvc executions/f03_windows/${{ inputs.parent_variant }}/*.dvc

      # =========================================================
      # STEP 1: variant4
      # =========================================================
      - name: Crear variante Fase 4
        env:
          PARAMS_JSON: ${{ inputs.params_json }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          def to_make_value(value):
              if isinstance(value, bool):
                  return "true" if value else "false"
              if isinstance(value, (list, dict)):
                  return json.dumps(value, ensure_ascii=False, separators=(",", ":"))
              return str(value)

          raw = os.environ.get("PARAMS_JSON", "").strip()
          params = json.loads(raw) if raw else {}

          if isinstance(params, str):
              try:
                  params = json.loads(params)
              except Exception:
                  pass

          if not isinstance(params, dict):
              print(f"[WARN] params no es dict, asumiendo dict vacío. Type={type(params)}")
              params = {}

          make_params = {}

          prediction_name = params.get("NAME")
          if prediction_name is None:
              prediction_name = params.get("PREDICTION_NAME")
          if prediction_name is None:
              prediction_name = params.get("prediction_name")
          if prediction_name is not None:
              make_params["NAME"] = prediction_name

          target_operator = params.get("OPERATOR")
          if target_operator is None:
              target_operator = params.get("TARGET_OPERATOR")
          if target_operator is None:
              target_operator = params.get("target_operator", "OR")
          make_params["OPERATOR"] = target_operator

          target_events = params.get("EVENTS")
          if target_events is None:
              target_events = params.get("TARGET_EVENT_TYPES")
          if target_events is None:
              target_events = params.get("target_event_types")
          if target_events is not None:
              make_params["EVENTS"] = target_events

          for key, value in params.items():
              normalized_key = str(key).strip().lower()
              if normalized_key in {"name", "prediction_name", "operator", "target_operator", "events", "target_event_types"}:
                  continue
              make_params[key] = value

          extra_args = []
          for key, value in make_params.items():
              k = str(key).strip()
              if not k:
                  continue
              extra_args.append(f"{k}={to_make_value(value)}")

          print("Ejecutando con:", " ".join(extra_args))

          subprocess.run(
              [
                  "make",
                  "variant4",
                  "VARIANT=${{ inputs.variant_id }}",
                  "PARENT=${{ inputs.parent_variant }}",
                  *extra_args,
              ],
              check=True,
          )
          PY

      - name: PR — publicar variant
        id: pr-variant
        uses: TeheORG/mlops4rtedgeUni/.github/actions/commit-and-pr@main
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f4
          step: variant
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkout_branch: ${{ inputs.checkout_branch }}

      - name: Merge PR de variant
        if: ${{ steps.pr-variant.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-variant.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      - name: Sync con base tras merge de variant
        if: ${{ steps.pr-variant.outputs.PR_NUMBER != '' }}
        run: |
          git fetch origin
          git checkout "${{ inputs.checkout_branch }}"
          git pull --ff-only origin "${{ inputs.checkout_branch }}"

      # =========================================================
      # STEP 2: script4
      # =========================================================
      - name: Ejecutar script de Fase 4 (Con monitor de RAM)
        env:
          PYTHONFAULTHANDLER: 1
        run: |
          (while true; do echo "[$(date '+%H:%M:%S')] RAM Libre:"; free -m | grep Mem; sleep 10; done) &
          MONITOR_PID=$!
          make script4 VARIANT=${{ inputs.variant_id }}
          kill $MONITOR_PID

      - name: Diagnostico de error (Solo si falla)
        if: failure()
        run: |
          dmesg -T | grep -i -E "killed|oom|out of memory" || echo "No hay logs de OOM en dmesg."
          free -m

      - name: PR — publicar script
        id: pr-script
        uses: TeheORG/mlops4rtedgeUni/.github/actions/commit-and-pr@main
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f4
          step: script
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkout_branch: ${{ inputs.checkout_branch }}

      - name: Merge PR de script
        if: ${{ steps.pr-script.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-script.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      - name: Sync con base tras merge de script
        if: ${{ steps.pr-script.outputs.PR_NUMBER != '' }}
        run: |
          git fetch origin
          git checkout "${{ inputs.checkout_branch }}"
          git pull --ff-only origin "${{ inputs.checkout_branch }}"

      # =========================================================
      # STEP 3: check4
      # =========================================================
      - name: Verificar resultados
        id: run-check
        if: always()
        run: |
          set +e
          make check4 VARIANT=${{ inputs.variant_id }}
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -ne 0 ]; then
            echo "[WARN] check4 failed with exit code $rc; continuing so verification metadata can be published"
          fi
          exit 0

      - name: PR — publicar check
        id: pr-check
        if: always()
        uses: TeheORG/mlops4rtedgeUni/.github/actions/commit-and-pr@main
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f4
          step: check
          paths: |
            ${{ env.VARIANT_ROOT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkout_branch: ${{ inputs.checkout_branch }}

      - name: Merge PR de check
        if: ${{ always() && steps.pr-check.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-check.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done

      - name: Sync con base tras merge de check
        if: ${{ always() && steps.pr-check.outputs.PR_NUMBER != '' }}
        run: |
          git fetch origin
          git checkout "${{ inputs.checkout_branch }}"
          git pull --ff-only origin "${{ inputs.checkout_branch }}"

      # =========================================================
      # STEP 4: register4
      # =========================================================
      - name: Registrar resultados de F4
        run: make register4 VARIANT=${{ inputs.variant_id }}

      - name: PR — publicar register
        id: pr-register
        uses: TeheORG/mlops4rtedgeUni/.github/actions/commit-and-pr@main
        with:
          variant_id: ${{ inputs.variant_id }}
          phase_id: f4
          step: register
          paths: |
            ${{ env.VARIANT_ROOT }}
            .dvc/config
            dvc.yaml
            dvc.lock
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkout_branch: ${{ inputs.checkout_branch }}

      - name: Merge PR de register
        if: ${{ steps.pr-register.outputs.PR_NUMBER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr-register.outputs.PR_NUMBER }}"
          for i in 1 2 3 4 5; do
            if gh pr merge "$PR" --squash --delete-branch; then break; fi
            echo "[WARN] merge falló intento $i, reintento en $((i*3))s..."
            sleep $((i * 3))
            [[ $i -eq 5 ]] && { echo "[ERROR] Merge falló tras 5 intentos" >&2; exit 1; }
          done
